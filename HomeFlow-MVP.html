<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="cyan">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HomeFlow — Residential Housing OS (MVP Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --a1:#2FE6F0; --a2:#4C8DFF; --a1-rgb:47,230,240; --a2-rgb:76,141,255;
  --bg:#06080F;
  --surface:rgba(255,255,255,.05); --surface-2:rgba(255,255,255,.09); --line:rgba(255,255,255,.10);
  --ink:#EAEEF7; --muted:#8B96AE; --muted-2:#6B7488;
  --brand:var(--a1); --brand-ink:#04060C; --brand-soft:rgba(var(--a1-rgb),.16);
  --green:#3DE0A0; --green-soft:rgba(61,224,160,.16); --amber:#F0B84C; --amber-soft:rgba(240,184,76,.16);
  --red:#F76D6D; --red-soft:rgba(247,109,109,.16); --purple:#A78BFA; --purple-soft:rgba(167,139,250,.16);
  --radius:16px; --radius-sm:11px;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 12px 30px -14px rgba(0,0,0,.7);
  --shadow-lg:0 30px 64px -22px rgba(0,0,0,.8);
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:"Space Grotesk","Inter",sans-serif; --mono:"Space Mono",ui-monospace,monospace;
}
html[data-accent="violet"]{ --a1:#A78BFA; --a2:#F472D6; --a1-rgb:167,139,250; --a2-rgb:244,114,214; }
html[data-accent="aurora"]{ --a1:#38E8C6; --a2:#7C6BFF; --a1-rgb:56,232,198; --a2-rgb:124,107,255; }
html[data-theme="light"]{
  --bg:#EEF1F8;
  --surface:rgba(255,255,255,.75); --surface-2:rgba(20,30,60,.05); --line:rgba(20,30,60,.12);
  --ink:#0A1024; --muted:#5A6584; --muted-2:#8791A8;
  --shadow:0 1px 2px rgba(20,30,60,.05),0 12px 30px -14px rgba(20,30,60,.16);
  --shadow-lg:0 30px 64px -22px rgba(20,30,60,.22);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font);
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--brand);text-decoration:none}
img{max-width:100%;display:block}

/* App frame — phone-first, expands on desktop */
#app{max-width:1120px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:96px}
.hide{display:none!important}

/* Top bar */
.topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 16px}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;letter-spacing:-.02em}
.logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#3b82f6);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
.topbar .spacer{flex:1}
.roleswitch{display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:999px;padding:5px 10px 5px 12px;font-size:13px;font-weight:600;color:var(--ink)}
.roleswitch .dot{width:8px;height:8px;border-radius:50%;background:var(--brand)}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--surface-2);
  border:1px solid var(--line);position:relative}
.iconbtn .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:999px;
  min-width:17px;height:17px;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 4px}

/* Content */
.view{padding:16px 16px 20px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-h{margin:2px 0 14px}
.page-h h1{font-size:24px;letter-spacing:-.03em;margin:0}
.page-h p{margin:4px 0 0;color:var(--muted)}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brand)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.p{padding:16px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:720px){.g2,.g3,.g4{grid-template-columns:1fr}.g2.keep,.g4.keep{grid-template-columns:1fr 1fr}}

.row{display:flex;align-items:center;gap:12px}
.wrap{flex-wrap:wrap}
.between{justify-content:space-between}
.muted{color:var(--muted)}
.small{font-size:13px}
.tiny{font-size:12px}
.b{font-weight:600}.bb{font-weight:700}
.center{text-align:center}
.mt{margin-top:12px}.mt2{margin-top:20px}.mb{margin-bottom:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:12px;
  font-weight:600;font-size:14px;background:var(--surface-2);color:var(--ink);border:1px solid var(--line);transition:.15s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(20,99,255,.28)}
.btn.dark{background:var(--surface-2);color:var(--a1);border-color:transparent}
.btn.ghost{background:transparent}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn.block{width:100%}
.btn.green{background:var(--green);color:#fff;border-color:transparent}
.btn.danger{background:var(--red);color:#fff;border-color:transparent}
.btn[disabled]{opacity:.5;pointer-events:none}

/* Pills / badges */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;
  background:var(--surface-2);border:1px solid var(--line)}
.pill.brand{background:var(--brand-soft);color:var(--a1);border-color:transparent}
.pill.green{background:var(--green-soft);color:var(--green);border-color:transparent}
.pill.amber{background:var(--amber-soft);color:var(--amber);border-color:transparent}
.pill.red{background:var(--red-soft);color:var(--red);border-color:transparent}
.pill.purple{background:var(--purple-soft);color:var(--purple);border-color:transparent}
.dotb{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}

/* Stat */
.stat{padding:14px 16px}
.stat .n{font-size:26px;font-weight:750;letter-spacing:-.03em}
.stat .l{color:var(--muted);font-size:13px;margin-top:2px}
.stat .t{font-size:12px;font-weight:700;margin-top:6px}
.up{color:var(--green)}.down{color:var(--red)}

/* Lists */
.list{display:flex;flex-direction:column}
.li{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.avatar{width:42px;height:42px;border-radius:12px;background:var(--brand-soft);color:var(--a1);
  display:grid;place-items:center;font-weight:700;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.avatar.round{border-radius:50%}
.thumb{width:100%;aspect-ratio:16/10;border-radius:12px;object-fit:cover;background:var(--surface-2)}

/* Progress */
.bar{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),#4f8bff)}
.ring{--v:0;width:64px;height:64px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--green) calc(var(--v)*1%),var(--surface-2) 0)}
.ring > span{width:50px;height:50px;border-radius:50%;background:var(--surface);display:grid;place-items:center;font-weight:750;font-size:15px}

/* Inputs */
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
.input{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:var(--surface);outline:none;transition:.15s}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
textarea.input{resize:vertical;min-height:70px}

/* Tabs */
.tabs{display:flex;gap:6px;background:var(--surface-2);border-radius:12px;padding:4px;overflow-x:auto}
.tabs button{flex:1;white-space:nowrap;padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted)}
.tabs button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* Bottom nav */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:45;background:rgba(255,255,255,.9);
  backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:8px 6px 14px}
.tabbar .max{max-width:1120px;margin:0 auto;width:100%;display:flex}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted-2);font-size:10.5px;font-weight:600;padding:4px 2px}
.tabbar button.on{color:var(--brand)}
.tabbar svg{width:23px;height:23px}

/* Modal / sheet */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(11,18,32,.42);display:flex;align-items:flex-end;
  justify-content:center;animation:fade .2s}
@media(min-width:720px){.overlay{align-items:center}}
.sheet{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;padding:8px 18px 24px;
  max-height:92vh;overflow:auto;box-shadow:var(--shadow-lg);animation:slideup .28s cubic-bezier(.2,.9,.3,1)}
@media(min-width:720px){.sheet{border-radius:22px}}
@keyframes slideup{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.sheet .grip{width:38px;height:5px;border-radius:999px;background:var(--line);margin:6px auto 12px}
.sheet h3{margin:2px 0 4px;font-size:19px;letter-spacing:-.02em}

/* Toast */
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:80;opacity:0;
  background:var(--surface-2);color:var(--a1);padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow-lg);transition:.3s;max-width:88%;text-align:center;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Banner */
.banner{border-radius:14px;padding:13px 15px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
.banner.info{background:var(--brand-soft);color:var(--a1)}
.banner.warn{background:var(--amber-soft);color:var(--amber)}
.banner.legal{background:#f4f6f9;color:var(--muted);border:1px solid var(--line)}
.banner .i{flex-shrink:0;font-weight:800}

/* Hero cards for listings */
.listing-card{overflow:hidden;position:relative}
.listing-card .featured{position:absolute;top:10px;left:10px;z-index:2}
.listing-card .heart{position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.92);display:grid;place-items:center}
.listing-card .body{padding:12px 14px 14px}
.price{font-size:20px;font-weight:750;letter-spacing:-.02em}

.seg{display:flex;gap:0;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.seg button{flex:1;padding:9px;font-size:13px;font-weight:600;color:var(--muted);background:var(--surface)}
.seg button.on{background:var(--brand);color:#fff}

table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
table.tbl th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;padding:8px 10px;border-bottom:1px solid var(--line)}
table.tbl td{padding:11px 10px;border-bottom:1px solid var(--line)}
table.tbl tr:last-child td{border-bottom:none}
.scrollx{overflow-x:auto}

.chip{display:inline-flex;padding:6px 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);
  font-size:13px;font-weight:600;margin:0 6px 8px 0;white-space:nowrap}
.chip.on{background:var(--brand);color:#fff;border-color:transparent}

.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border:none}
.kv .k{color:var(--muted)}

.check{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;flex-shrink:0}
.check.on{background:var(--green);border-color:transparent;color:#fff}

.timeline{position:relative;padding-left:22px}
.timeline .ev{position:relative;padding:0 0 16px}
.timeline .ev:before{content:"";position:absolute;left:-16px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.timeline:before{content:"";position:absolute;left:-11px;top:6px;bottom:6px;width:2px;background:var(--line)}
/* ===== FUTURISTIC DARK OVERRIDES (match landing) ===== */
body{background:var(--bg)!important}
.logo,.page-h h1,.stat .n,.price,.sheet h3{font-family:var(--display)!important;letter-spacing:-.02em}
.eyebrow{font-family:var(--mono)!important;letter-spacing:.2em!important;color:var(--a1)!important}
.logo .mark{background:linear-gradient(140deg,var(--a1),var(--a2))!important;color:#04060C!important;box-shadow:0 0 20px -4px rgba(var(--a1-rgb),.8)}
.topbar{background:color-mix(in srgb,var(--bg) 78%,transparent)!important;border-bottom-color:var(--line)!important}
.tabbar{background:color-mix(in srgb,var(--bg) 82%,transparent)!important;border-top-color:var(--line)!important}
.card{backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%)}
.roleswitch{background:var(--surface)!important;border-color:var(--line)!important;color:var(--ink)!important}
.roleswitch .dot{background:var(--a1)!important}
.iconbtn{background:var(--surface)!important;border-color:var(--line)!important}
.btn{background:var(--surface-2);color:var(--ink);border-color:var(--line)}
.btn.primary{background:linear-gradient(135deg,var(--a1),var(--a2))!important;color:#04060C!important;border-color:transparent!important;box-shadow:0 8px 24px -10px rgba(var(--a1-rgb),.8)!important}
.btn.dark{background:var(--surface-2)!important;color:var(--ink)!important}
.btn.green{background:var(--green)!important;color:#04060C!important}
.btn.danger{background:var(--red)!important;color:#04060C!important}
.bar{background:var(--surface-2)!important}
.bar>i{background:linear-gradient(90deg,var(--a1),var(--a2))!important}
.avatar{background:rgba(var(--a1-rgb),.14);color:var(--a1)}
.input{background:var(--surface)!important;color:var(--ink)!important;border-color:var(--line)!important}
.input:focus{border-color:var(--a1)!important;box-shadow:0 0 0 3px rgba(var(--a1-rgb),.25)!important}
.input::placeholder{color:var(--muted-2)}
.tabs{background:var(--surface)!important}
.tabs button.on{background:var(--surface-2)!important;color:var(--ink)!important;box-shadow:none!important}
.tabbar button.on{color:var(--a1)!important}
.pill{background:var(--surface-2);border-color:var(--line)}
.pill.brand{background:rgba(var(--a1-rgb),.16)!important;color:var(--a1)!important}
.seg{border-color:var(--line)!important}
.seg button{background:var(--surface)!important;color:var(--muted)}
.seg button.on{background:linear-gradient(135deg,var(--a1),var(--a2))!important;color:#04060C!important}
#toast{background:#121A2B!important;color:#fff!important;border:1px solid rgba(255,255,255,.12)}
.banner.info{background:rgba(var(--a1-rgb),.14)!important;color:var(--a1)!important}
.banner.legal{background:var(--surface)!important;color:var(--muted)!important;border-color:var(--line)!important}
.chip{background:var(--surface-2)!important;border-color:var(--line)!important;color:var(--ink)}
.chip.on{background:linear-gradient(135deg,var(--a1),var(--a2))!important;color:#04060C!important;border-color:transparent!important}
.thumb{background:var(--surface-2)}
.check.on{background:var(--green)!important;color:#04060C!important}
.timeline .ev:before{background:var(--a1)!important;box-shadow:0 0 0 3px rgba(var(--a1-rgb),.25)!important}
.timeline:before{background:var(--line)!important}
.li,.kv{border-bottom-color:var(--line)!important}
table.tbl th,table.tbl td{border-bottom-color:var(--line)!important}
a{color:var(--a1)}
/* accent picker */
.hf-picker{position:fixed;right:16px;bottom:84px;z-index:100;display:flex;align-items:center;gap:9px;
  padding:10px 14px;border-radius:30px;background:var(--surface-2);border:1px solid var(--line);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:var(--shadow-lg)}
.hf-picker span{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted)}
.hf-sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.hf-sw:hover{transform:scale(1.12)}
.hf-sw[aria-pressed="true"]{border-color:var(--ink)}
.hf-sw.cyan{background:linear-gradient(135deg,#2FE6F0,#4C8DFF)}
.hf-sw.violet{background:linear-gradient(135deg,#A78BFA,#F472D6)}
.hf-sw.aurora{background:linear-gradient(135deg,#38E8C6,#7C6BFF)}
.hf-sep{width:1px;height:20px;background:var(--line)}
.hf-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.06em;
  color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:6px 11px}
.hf-toggle:hover{border-color:var(--a1)}
</style>
</head>

const state = {
  role:null,           // 'tenant' | 'landlord' | 'agent' | 'vendor' | 'admin'

  view:'home',         // current view key

/* ---------------- HELPERS ---------------- */
const $ = sel => document.querySelector(sel);
const el = id => document.getElementById(id);
function money(n){return '$'+Number(n).toLocaleString('en-US');}
function listing(id){return DB.listings.find(l=>l.id===id);}
function tenant(id){return DB.users.find(u=>u.id===id);}
function me(){return tenant(state.tenantId);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2400);}
function go(view,params){state.view=view;state.params=params||{};render();window.scrollTo({top:0,behavior:'instant'});}
function closeModal(){el('modal-root').innerHTML='';}
function modal(html){el('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet"><div class="grip"></div>${html}</div></div>`;}

function statusPill(s){
  const map={submitted:['amber','Submitted'],reviewed:['brand','Under review'],approved:['green','Approved'],denied:['red','Not selected'],leased:['purple','Leased'],
    requested:['amber','Requested'],confirmed:['green','Confirmed'],completed:['brand','Completed'],New:['green','New'],Contacted:['amber','Contacted']};
  const [c,l]=map[s]||['','',s];return `<span class="pill ${c}"><span class="dotb"></span>${l||s}</span>`;
}

      if(v==='apps')return tenantApps();

      if(v==='thread')return threadView();
      if(v==='homebuyer')return homebuyerDash();
      if(v==='marketplace')return vendorMarketplace();
      if(v==='alerts')return alertsView();
      if(v==='membership')return membershipView('tenant');
      if(v==='account')return tenantAccount();

    if(R==='landlord'){

      if(v==='editlisting')return landlordEditListing();

      if(v==='showings')return showingsView('landlord');

      if(v==='thread')return threadView();
      if(v==='analytics')return landlordAnalytics();
      if(v==='marketplace')return vendorMarketplace();
      if(v==='membership')return membershipView('landlord');
      if(v==='account')return simpleAccount(DB.landlord);
    }
    if(R==='agent'){
      if(v==='home')return agentHome();
      if(v==='showings')return showingsView('agent');
      if(v==='messages')return messagesList();
      if(v==='thread')return threadView();
      if(v==='listing')return listingDetail();
      if(v==='account')return simpleAccount(DB.agent);
    }
    if(R==='vendor'){
      if(v==='home')return vendorHome();
      if(v==='leads')return vendorLeads();
      if(v==='profile')return vendorProfile();
      if(v==='membership')return membershipView('vendor');
      if(v==='messages')return messagesList();
      if(v==='thread')return threadView();
    }
    if(R==='admin'){
      if(v==='home')return adminHome();
      if(v==='users')return adminUsers();
      if(v==='listings')return adminListings();
      if(v==='vendors')return adminVendors();

  }catch(e){return `<div class="card p"><b>View error</b><p class="muted small">${esc(e.message)}</p></div>`;}

}

function login(role){
  state.role=role;
  state.uid = role==='tenant'?state.tenantId : role==='landlord'?'l1' : role==='agent'?'a1' : role==='vendor'?'v9':'admin';
  state.view='home';state.params={};
  render();window.scrollTo(0,0);
}
function logout(){state.role=null;state.view='home';render();}

function tabbar(){

    tenant:[['home','Home','home'],['search','Search','search'],['apps','Applications','doc'],['messages','Messages','chat'],['passport','Passport','user']],
    landlord:[['home','Home','home'],['listings','Listings','building'],['applications','Applicants','doc'],['showings','Showings','cal'],['analytics','Insights','chart']],

    vendor:[['home','Home','home'],['leads','Leads','doc'],['profile','Profile','building'],['membership','Plan','cart']],
    admin:[['home','Overview','chart'],['users','Users','user'],['listings','Listings','building'],['vendors','Vendors','cart'],['subs','Billing','cog']],
  };
  const items=defs[state.role]||[];
  const active=v=>{
    if(v===state.view)return true;
    if(state.view==='listing'&&v==='search'&&state.role==='tenant')return true;
    if(state.view==='thread'&&v==='messages')return true;
    if(state.view==='appdetail'&&v==='applications')return true;
    if((state.view==='editlisting')&&v==='listings')return true;
    return false;
  };
  return `<div class="tabbar"><div class="max">${items.map(([v,l,ic])=>
    `<button class="${active(v)?'on':''}" onclick="go('${v}')">${svg(ic)}<span>${l}</span></button>`).join('')}</div></div>`;
}

/* ---------- Listings search ---------- */
function listingsSearch(){
  const f=state.params.filters||{q:'',beds:0,maxRent:5000,pets:false};
  let items=DB.listings.filter(l=>l.status==='Active');
  if(f.q)items=items.filter(l=>(l.title+l.addr).toLowerCase().includes(f.q.toLowerCase()));
  items=items.filter(l=>l.beds>=f.beds && l.rent<=f.maxRent && (!f.pets||!/no pets/i.test(l.pets)));
  items.sort((a,b)=>(b.featured-a.featured)||a.rent-b.rent);
  return `
  <div class="page-h"><h1>Find your home</h1><p>${items.length} rentals · Tampa Bay area</p></div>
  <div class="card p mb">
    <div class="field" style="margin:0"><div class="row" style="gap:8px">
      <input class="input" id="q" placeholder="City, neighborhood, or address" value="${esc(f.q)}" oninput="applyFilters()">
    </div></div>
    <div class="row wrap mt" style="gap:0">
      ${[['Any',0],['1+ bd',1],['2+ bd',2],['3+ bd',3]].map(([t,v])=>`<span class="chip ${f.beds===v?'on':''}" onclick="setBeds(${v})">${t}</span>`).join('')}
      <span class="chip ${f.pets?'on':''}" onclick="togglePets()">🐾 Pets OK</span>
    </div>
    <div class="field mt" style="margin:0"><label>Max rent: <span id="rentlbl" class="b">${money(f.maxRent)}</span></label>
      <input type="range" min="1000" max="5000" step="50" value="${f.maxRent}" style="width:100%" oninput="el('rentlbl').textContent='$'+Number(this.value).toLocaleString();this._v=this.value" onchange="setRent(this.value)"></div>
  </div>
  <div class="grid g2">${items.length?items.map(listingCard).join(''):'<div class="card p muted center">No matches — widen your filters.</div>'}</div>
  <div class="banner legal mt2"><span class="i">§</span><span>Listings are shown to all users equally. HomeFlow does not steer, rank, or filter renters or neighborhoods based on any protected class. Fair Housing compliant by design.</span></div>
  `;
}
function _filters(){return state.params.filters||{q:'',beds:0,maxRent:5000,pets:false};}
function applyFilters(){const f=_filters();f.q=el('q').value;state.params.filters=f; // re-render list only
  go('search',{filters:f});el('q')&&el('q').focus();
  const q=el('q');if(q){q.selectionStart=q.selectionEnd=q.value.length;}}
function setBeds(v){const f=_filters();f.beds=v;go('search',{filters:f});}
function togglePets(){const f=_filters();f.pets=!f.pets;go('search',{filters:f});}
function setRent(v){const f=_filters();f.maxRent=+v;go('search',{filters:f});}

    <div class="list">
      ${shareRow('Identity & contact',true)}

function shareRow(t,on){return `<div class="li"><div class="check ${on?'on':''}">${on?'✓':''}</div><div class="b small">${t}</div></div>`;}
function submitApply(listingId){
  if(!el('consent').checked){toast('Please provide sharing consent to continue');return;}
  const id='ap'+(DB.applications.length+1+Math.floor(Math.random()*90));
  const now='Jul 4, 2026';
  DB.applications.unshift({id,listing:listingId,tenant:state.tenantId,status:'submitted',submitted:now,
    audit:[[now+' · now','Application submitted with Rental Passport'],[now+' · now','Documents shared: ID, income, employment, references']]});
  const l=listing(listingId);l.apps++;l.leads++;
  closeModal();go('apps');toast('Application submitted ✓');
}

function nameFor(id){
  if(id==='l1')return DB.landlord.name; if(id==='a1')return DB.agent.name;
  const t=tenant(id); if(t)return t.name; const v=DB.vendors.find(v=>v.id===id); if(v)return v.name; return id;}
function initialsFor(id){return nameFor(id).split(' ').map(w=>w[0]).slice(0,2).join('');}
function myId(){return state.role==='tenant'?state.tenantId:state.role==='landlord'?'l1':state.role==='agent'?'a1':'v9';}

function sendMsg(thId){const inp=el('msgInput');const v=inp.value.trim();if(!v)return;
  const th=DB.threads.find(t=>t.id===thId);th.msgs.push({from:myId(),t:v,at:'Jul 4 · now'});go('thread',{id:thId});

/* ---------- Landlord analytics ---------- */
function landlordAnalytics(){
  const mine=DB.listings.filter(l=>l.landlord==='l1');
  const totV=mine.reduce((s,l)=>s+l.views,0),totL=mine.reduce((s,l)=>s+l.leads,0),totA=mine.reduce((s,l)=>s+l.apps,0);

function showingActions(s){
  if(state.role==='landlord'){
    if(s.status==='requested')return `<div class="row mt" style="gap:8px">
      <button class="btn green block sm" onclick="confirmShowing('${s.id}')">Approve</button>
      <button class="btn block sm" onclick="assignAgent('${s.id}')">Assign agent</button></div>`;
    if(s.status==='confirmed')return `<div class="row mt" style="gap:8px"><button class="btn block sm" onclick="toast('Rescheduled (demo)')">Reschedule</button>
      <button class="btn block sm" onclick="setShowing('${s.id}','completed')">Mark complete</button></div>`;
  }
  if(state.role==='agent'){
    if(s.status==='requested')return `<button class="btn primary block sm mt" onclick="claimShowing('${s.id}')">Accept & cover this showing</button>`;
    if(s.agent==='a1'&&s.status==='confirmed')return `<button class="btn block sm mt" onclick="setShowing('${s.id}','completed')">Mark complete</button>`;

    ['Vendor Preferred','$99/mo',DB.vendors.filter(v=>v.preferred&&!v.featured).length,'Active'],
    ['Vendor Featured','$249/mo',DB.vendors.filter(v=>v.featured).length,'Active']];
  return adminBack('Billing & subscriptions','Manage plans and subscription status (Stripe)')+
  `<div class="card p scrollx"><table class="tbl"><thead><tr><th>Plan</th><th>Price</th><th>Subscribers</th><th>Status</th></tr></thead><tbody>
    ${subs.map(s=>`<tr><td class="b">${s[0]}</td><td>${s[1]}</td><td>${s[2]}</td><td>${s[3]==='Active'?'<span class="pill green tiny">Active</span>':'<span class="pill tiny">'+s[3]+'</span>'}</td></tr>`).join('')}</tbody></table></div>
  <div class="banner legal mt2"><span class="i">§</span><span>Production billing runs on Stripe — PCI-compliant, with dunning, proration, invoices & tax handling. No card data touches HomeFlow servers.</span></div>`;
}
function adminLeads(){
  return adminBack('Marketplace leads','View & export vendor lead activity')+
  `<div class="row between mb"><div class="muted small">${DB.leads.length} leads</div><button class="btn sm primary" onclick="exportLeads()">⬇ Export CSV</button></div>
  <div class="card p scrollx"><table class="tbl"><thead><tr><th>Lead</th><th>Vendor</th><th>Need</th><th>Status</th></tr></thead><tbody>
    ${DB.leads.map(l=>{const v=DB.vendors.find(x=>x.id===l.vendor);return `<tr><td class="b">${l.name}</td><td>${v?v.name:l.vendor}</td><td class="muted">${l.need}</td><td>${statusPill(l.status)}</td></tr>`;}).join('')}</tbody></table></div>`;
}
function exportLeads(){
  const rows=[['Name','Vendor','Category','Need','City','Date','Status'],
    ...DB.leads.map(l=>{const v=DB.vendors.find(x=>x.id===l.vendor)||{};return [l.name,v.name||l.vendor,v.category||'',l.need,l.city,l.at,l.status];})];
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='homeflow-leads.csv';a.click();
  toast('Leads exported ✓');
}
function adminBack(title,sub){return `<button class="btn ghost sm" onclick="go('home')">← Overview</button>
  <div class="page-h" style="margin-top:8px"><h1>${title}</h1><p>${sub}</p></div>`;}

/* === END VIEWS === */

/* ---------------- BOOT ---------------- */
render();
</script>
<div class="hf-picker" role="group" aria-label="Theme">
  <div class="hf-sw cyan"   data-accent="cyan"   role="button" tabindex="0" aria-label="Cyan"   aria-pressed="true"></div>
  <div class="hf-sw violet" data-accent="violet" role="button" tabindex="0" aria-label="Violet" aria-pressed="false"></div>
  <div class="hf-sw aurora" data-accent="aurora" role="button" tabindex="0" aria-label="Aurora" aria-pressed="false"></div>
  <span class="hf-sep"></span>
  <button class="hf-toggle" id="hfMode" aria-label="Toggle light or dark"><span id="hfIcon">◐</span><span id="hfText">Dark</span></button>
</div>
<script>
document.querySelectorAll('.hf-sw').forEach(function(sw){
  sw.addEventListener('click',function(){
    document.documentElement.dataset.accent=sw.dataset.accent;
    document.querySelectorAll('.hf-sw').forEach(function(s){s.setAttribute('aria-pressed',s===sw);});
  });
});
document.getElementById('hfMode').addEventListener('click',function(){
  var root=document.documentElement;
  root.dataset.theme = (root.dataset.theme==='light')?'dark':'light';
  var light = root.dataset.theme==='light';
  document.getElementById('hfText').textContent = light?'Light':'Dark';
  document.getElementById('hfIcon').textContent = light?'◑':'◐';
});
</script>
</body>
</html>
